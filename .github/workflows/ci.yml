name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# ยกเลิก run เก่าของ branch เดียวกันเมื่อมี push ใหม่ (ไม่เปลือง CI minutes รันของเก่าที่ตกรุ่นแล้ว)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
