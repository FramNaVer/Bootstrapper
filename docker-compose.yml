# =============================================================
# Local development stack
# =============================================================
# ใช้ประจำวัน (DB local อย่างเดียว — แอปรันบน host ด้วย npm run dev):
#   docker compose up -d
#
# ครั้งแรกหลังสร้าง DB (หรือหลังมี migration ใหม่):
#   1) ตั้ง .env: DATABASE_URL/DIRECT_URL ชี้ local (ดู .env.example)
#   2) migrate dev DB :  npx prisma migrate deploy
#   3) migrate test DB:  (PowerShell)
#      $env:DIRECT_URL="postgresql://app:app@localhost:5432/bootstrapper_test"; npx prisma migrate deploy
#      (เสร็จแล้วเปิด terminal ใหม่ หรือ Remove-Item Env:DIRECT_URL เพื่อไม่ให้ค่าค้าง)
#
# รันทั้ง stack ในคอนเทนเนอร์ (ทดสอบ image แบบ prod):
#   docker compose --profile app up --build
#   ข้อควรระวัง: ในคอนเทนเนอร์ hostname ของ DB คือ "db" ไม่ใช่ "localhost"
#   → DATABASE_URL ใน .env ต้องเป็น postgresql://app:app@db:5432/bootstrapper
#
# ทำไมต้องมี DB local: เดิม dev/integration test ยิงเข้า Neon ที่แชร์กับ prod
# → ข้อมูลเทสต์ตกค้างปนของจริง (เคยเจอแล้ว) + dev ออฟไลน์ไม่ได้
# =============================================================
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: bootstrapper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # สร้าง DB ที่สอง (bootstrapper_test) ให้ integration test แยกขาดจาก dev
      # หมายเหตุ: init script รันเฉพาะ "ครั้งแรกที่ volume ว่าง" — ถ้าเพิ่มไฟล์
      # ทีหลังต้อง docker compose down -v แล้ว up ใหม่ (ข้อมูลใน volume หายหมด)
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d bootstrapper"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # อยู่ใต้ profile "app" → docker compose up ปกติจะ "ไม่" รันตัวนี้
  # (dev ประจำวันรันแอปบน host — คอนเทนเนอร์นี้ไว้ทดสอบ image จริงเป็นครั้งคราว)
  app:
    profiles: ["app"]
    build: .
    env_file: .env
    environment:
      # บังคับ production mode ในคอนเทนเนอร์ (JSON logs, trust proxy)
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
