# รันแอปในคอนเทนเนอร์ด้วยคำสั่งเดียว: docker compose up --build
#
# ค่าคอนฟิกทั้งหมด (รวม DATABASE_URL ที่ชี้ไป Neon) อ่านจาก .env
# → ไม่ต้องแก้ไฟล์นี้ แค่มี .env ที่ถูกต้อง (ดู .env.example)
services:
  app:
    build: .
    env_file: .env
    environment:
      # บังคับ production mode ในคอนเทนเนอร์ (JSON logs, trust proxy)
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

